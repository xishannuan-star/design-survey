<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设计师工作台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: #f5f5f7;
      color: #333;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
      color: #667eea;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .welcome-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 32px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .welcome-card h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .action-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .action-card h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #1f2937;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #374151;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .survey-list {
      margin-top: 24px;
    }

    .survey-item {
      background: #f9fafb;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 2px solid #e5e7eb;
    }

    .survey-item h4 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .survey-item p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .survey-link {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid #d1d5db;
    }

    .survey-link input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      color: #4b5563;
    }

    .copy-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #5568d3;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .login-box h2 {
      text-align: center;
      color: #667eea;
      margin-bottom: 32px;
      font-size: 24px;
    }

    .error-msg {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .success-msg {
      background: #d1fae5;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- 登录页面 -->
  <div id="login-page" class="login-container">
    <div class="login-box">
      <h2>🎨 设计师登录</h2>
      <div class="error-msg" id="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" name="email" placeholder="请输入您的邮箱" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">登录</button>
      </form>
      <p style="text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280;">
        还没有账号？请联系管理员创建
      </p>
    </div>
  </div>

  <!-- 工作台页面 -->
  <div id="dashboard-page" style="display: none;">
    <div class="header">
      <h1>设计师工作台</h1>
      <div class="user-info">
        <span id="user-name">加载中...</span>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div class="container">
      <div class="welcome-card">
        <h2>👋 欢迎回来，<span id="welcome-name"></span></h2>
        <p style="opacity: 0.9; font-size: 14px; margin-top: 4px;">在这里创建项目并生成专属评价链接</p>
      </div>

      <div class="action-card">
        <h3>➕ 创建新的评价项目</h3>
        <div class="success-msg" id="create-success"></div>
        <form id="create-form">
          <div class="form-group">
            <label>项目名称 *</label>
            <input type="text" name="project_name" placeholder="例如：APP界面设计、品牌视觉升级" required>
          </div>
          <div class="form-group">
            <label>项目描述 *</label>
            <textarea name="project_description" placeholder="详细描述您本次负责的设计工作内容、交付物、时间周期等，需求方将在评价页面看到此描述" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">生成评价链接</button>
        </form>
      </div>

      <div class="action-card">
        <h3>📋 我的评价项目</h3>
        <div class="survey-list" id="survey-list">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>暂无评价项目，创建一个吧</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://aidpzpwfaoglagjxkpzz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpZHB6cHdmYW9nbGFnanhrcHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0MTgyODIsImV4cCI6MjA1Mjk5NDI4Mn0.zLzemk2tv33pu0089YAALg_BfQ-UqGZTpLm7p7F-LBs';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // 检查登录状态
    async function checkAuth() {
      const session = localStorage.getItem('designer_session');
      if (session) {
        currentUser = JSON.parse(session);
        showDashboard();
      } else {
        showLogin();
      }
    }

    // 显示登录页面
    function showLogin() {
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('dashboard-page').style.display = 'none';
    }

    // 显示工作台
    async function showDashboard() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('dashboard-page').style.display = 'block';

      // 获取设计师信息
      const { data: designer } = await supabaseClient
        .from('designers')
        .select('*')
        .eq('id', currentUser.id)
        .single();

      if (designer) {
        document.getElementById('user-name').textContent = designer.name;
        document.getElementById('welcome-name').textContent = designer.name;
        loadSurveys(designer.id);
      }
    }

    // 登录
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);

      try {
        // 直接查询 designers 表验证
        const { data: designer, error } = await supabaseClient
          .from('designers')
          .select('*')
          .eq('email', formData.get('email'))
          .eq('password_hash', formData.get('password'))
          .single();

        if (error || !designer) {
          throw new Error('邮箱或密码错误');
        }

        currentUser = { email: designer.email, id: designer.id };
        localStorage.setItem('designer_session', JSON.stringify(currentUser));
        showDashboard();
      } catch (error) {
        showError('login-error', error.message);
      }
    });

    // 退出登录
    async function logout() {
      localStorage.removeItem('designer_session');
      currentUser = null;
      showLogin();
    }

    // 生成随机链接码
    function generateLinkCode() {
      return Math.random().toString(36).substring(2, 10);
    }

    // 创建评价项目
    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);

      try {
        // 获取当前设计师ID（从 session 获取）
        const linkCode = generateLinkCode();

        const { error } = await supabaseClient
          .from('surveys')
          .insert([{
            designer_id: currentUser.id,
            project_name: formData.get('project_name'),
            project_description: formData.get('project_description'),
            link_code: linkCode
          }]);

        if (error) throw error;

        // 清空表单
        e.target.reset();

        // 显示成功消息
        const successMsg = document.getElementById('create-success');
        successMsg.textContent = '✓ 项目创建成功！';
        successMsg.style.display = 'block';
        setTimeout(() => {
          successMsg.style.display = 'none';
        }, 3000);

        // 刷新列表
        loadSurveys(currentUser.id);

      } catch (error) {
        alert('创建失败：' + error.message);
      }
    });

    // 加载评价项目列表
    async function loadSurveys(designerId) {
      const { data: surveys, error } = await supabaseClient
        .from('surveys')
        .select('*')
        .eq('designer_id', designerId)
        .order('created_at', { ascending: false });

      const listEl = document.getElementById('survey-list');

      if (!surveys || surveys.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>暂无评价项目，创建一个吧</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = surveys.map(survey => {
        const link = `${window.location.origin}/survey.html?code=${survey.link_code}`;
        return `
          <div class="survey-item">
            <h4>${survey.project_name}</h4>
            <p>${survey.project_description}</p>
            <p style="font-size: 12px; color: #9ca3af;">创建时间：${new Date(survey.created_at).toLocaleString('zh-CN')}</p>
            <div class="survey-link">
              <input type="text" value="${link}" readonly id="link-${survey.id}">
              <button class="copy-btn" onclick="copyLink('link-${survey.id}')">复制链接</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 复制链接
    function copyLink(inputId) {
      const input = document.getElementById(inputId);
      input.select();
      document.execCommand('copy');

      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '已复制！';
      setTimeout(() => {
        btn.textContent = originalText;
      }, 2000);
    }

    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
    }

    // 页面加载时执行
    checkAuth();
  </script>
</body>
</html>
